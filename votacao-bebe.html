<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menino ou Menina?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF5EC;
    --ink: #2E2A25;
    --dusty-blue: #7FA3C4;
    --dusty-blue-deep: #5C81A6;
    --dusty-rose: #E29AA8;
    --dusty-rose-deep: #C96E82;
    --gold: #E7B15C;
    --line: #E5DACB;
    --card: #FFFFFF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    width: 100%;
    max-width: 520px;
    padding: 40px 24px 60px;
  }

  .eyebrow {
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dusty-rose-deep);
    font-weight: 700;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(34px, 8vw, 46px);
    text-align: center;
    margin: 0 0 8px;
    line-height: 1.08;
    background: linear-gradient(100deg, var(--dusty-blue-deep) 0%, var(--dusty-blue-deep) 45%, var(--dusty-rose-deep) 55%, var(--dusty-rose-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    text-align: center;
    color: #6B6357;
    font-size: 15px;
    margin: 0 0 32px;
    line-height: 1.5;
  }

  /* Signature element: baby scale / seesaw */
  .scale-wrap {
    margin: 0 auto 36px;
    width: 100%;
    max-width: 380px;
  }

  svg { display: block; width: 100%; height: auto; }

  .beam {
    transform-origin: 200px 90px;
    transition: transform 1.1s cubic-bezier(.34,1.56,.64,1);
  }

  .pan-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }

  .count-num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 2px 14px rgba(46,42,37,0.05);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #8A8175;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    background: var(--cream);
    color: var(--ink);
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--dusty-blue); }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 8px;
  }

  .choice-btn {
    border: 2px solid var(--line);
    background: var(--cream);
    border-radius: 16px;
    padding: 20px 12px;
    cursor: pointer;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .choice-btn:hover { transform: translateY(-2px); }
  .choice-btn:active { transform: translateY(0); }

  .choice-btn.menino { }
  .choice-btn.menino:hover, .choice-btn.menino.selected {
    border-color: var(--dusty-blue-deep);
    background: #EEF4FA;
  }
  .choice-btn.menina:hover, .choice-btn.menina.selected {
    border-color: var(--dusty-rose-deep);
    background: #FBEEF1;
  }

  .choice-icon { font-size: 30px; }
  .choice-text { font-weight: 700; font-size: 15px; }

  .submit-btn {
    width: 100%;
    margin-top: 16px;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: var(--ink);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .submit-btn:not(:disabled):hover { transform: translateY(-1px); }

  .status {
    text-align: center;
    font-size: 14px;
    color: #8A8175;
    margin-top: 14px;
    min-height: 18px;
  }

  .status.ok { color: var(--dusty-blue-deep); font-weight: 600; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 36px 0 20px;
    color: #B3A98E;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .voters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 18px;
  }

  .voter-chip {
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--cream);
    border: 1px solid var(--line);
    color: #6B6357;
  }
  .voter-chip.menino { border-color: #C7DAEA; color: var(--dusty-blue-deep); }
  .voter-chip.menina { border-color: #F0CDD6; color: var(--dusty-rose-deep); }

  .reset-link {
    display: block;
    text-align: center;
    margin-top: 28px;
    font-size: 12.5px;
    color: #B3A98E;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #B3A98E;
    margin-top: 28px;
    line-height: 1.6;
  }

  @media (prefers-reduced-motion: reduce) {
    .beam { transition: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Votação em família</div>
  <h1>Menino ou Menina?</h1>
  <p class="sub">Escreve o teu nome e dá o teu palpite. O resultado atualiza-se para todos, em tempo real.</p>

  <div class="scale-wrap">
    <svg viewBox="0 0 400 200" id="scaleSvg">
      <!-- stand -->
      <rect x="196" y="90" width="8" height="80" fill="#D8CBAF" rx="2"/>
      <ellipse cx="200" cy="174" rx="46" ry="8" fill="#E5DACB"/>
      <circle cx="200" cy="90" r="6" fill="#8A8175"/>

      <g class="beam" id="beam">
        <rect x="60" y="86" width="280" height="6" rx="3" fill="#8A8175"/>
        <!-- left pan (menino) -->
        <line x1="90" y1="90" x2="90" y2="130" stroke="#C7DAEA" stroke-width="2"/>
        <line x1="130" y1="90" x2="130" y2="130" stroke="#C7DAEA" stroke-width="2"/>
        <path d="M78 130 Q110 152 142 130 L134 132 Q110 146 86 132 Z" fill="var(--dusty-blue)" opacity="0.9"/>
        <ellipse cx="110" cy="130" rx="34" ry="7" fill="#EEF4FA" stroke="#C7DAEA" stroke-width="1.5"/>
        <text x="110" y="112" text-anchor="middle" class="pan-label" fill="var(--dusty-blue-deep)">MENINO</text>
        <text x="110" y="150" text-anchor="middle" class="count-num" id="mininoCount" font-size="20" fill="var(--dusty-blue-deep)">0</text>

        <!-- right pan (menina) -->
        <line x1="270" y1="90" x2="270" y2="130" stroke="#F0CDD6" stroke-width="2"/>
        <line x1="310" y1="90" x2="310" y2="130" stroke="#F0CDD6" stroke-width="2"/>
        <path d="M258 130 Q290 152 322 130 L314 132 Q290 146 266 132 Z" fill="var(--dusty-rose)" opacity="0.9"/>
        <ellipse cx="290" cy="130" rx="34" ry="7" fill="#FBEEF1" stroke="#F0CDD6" stroke-width="1.5"/>
        <text x="290" y="112" text-anchor="middle" class="pan-label" fill="var(--dusty-rose-deep)">MENINA</text>
        <text x="290" y="150" text-anchor="middle" class="count-num" id="mininaCount" font-size="20" fill="var(--dusty-rose-deep)">0</text>
      </g>
    </svg>
  </div>

  <div class="card">
    <label for="nameInput">O teu nome</label>
    <input type="text" id="nameInput" placeholder="Ex: Tia Marta" autocomplete="off">

    <label>O teu palpite</label>
    <div class="choices">
      <button class="choice-btn menino" data-choice="menino">
        <span class="choice-icon">💙</span>
        <span class="choice-text">Menino</span>
      </button>
      <button class="choice-btn menina" data-choice="menina">
        <span class="choice-icon">🩷</span>
        <span class="choice-text">Menina</span>
      </button>
    </div>

    <button class="submit-btn" id="submitBtn" disabled>Votar</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <div class="divider">Quem já votou</div>
  <div class="voters" id="votersList"></div>

  <p class="footer-note" id="totalNote"></p>
</div>

<script>
  let selectedChoice = null;
  let myName = null;
  let myPreviousVote = null;

  const nameInput = document.getElementById('nameInput');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  const votersList = document.getElementById('votersList');
  const totalNote = document.getElementById('totalNote');
  const beam = document.getElementById('beam');
  const mininoCount = document.getElementById('mininoCount');
  const mininaCount = document.getElementById('mininaCount');

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedChoice = btn.dataset.choice;
      updateSubmitState();
    });
  });

  nameInput.addEventListener('input', updateSubmitState);

  function updateSubmitState() {
    const nameOk = nameInput.value.trim().length > 0;
    submitBtn.disabled = !(nameOk && selectedChoice);
  }

  function slug(name) {
    return name.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_À-ÿ]/g, '');
  }

  async function loadResults() {
    try {
      const res = await window.storage.list('votes:', true);
      const keys = res && res.keys ? res.keys : [];
      let mininoTotal = 0, mininaTotal = 0;
      const chips = [];

      for (const k of keys) {
        try {
          const item = await window.storage.get(k, true);
          if (item && item.value) {
            const data = JSON.parse(item.value);
            if (data.choice === 'menino') mininoTotal++;
            if (data.choice === 'menina') mininaTotal++;
            chips.push(data);
          }
        } catch (e) { /* skip broken entry */ }
      }

      mininoCount.textContent = mininoTotal;
      mininaCount.textContent = mininaTotal;

      const total = mininoTotal + mininaTotal;
      const diff = mininoTotal - mininaTotal;
      const maxTilt = 12;
      const tilt = total === 0 ? 0 : Math.max(-maxTilt, Math.min(maxTilt, diff * 3));
      beam.style.transform = `rotate(${tilt}deg)`;

      votersList.innerHTML = '';
      chips.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0)).forEach(v => {
        const chip = document.createElement('span');
        chip.className = 'voter-chip ' + v.choice;
        chip.textContent = `${v.name} — ${v.choice === 'menino' ? '💙' : '🩷'}`;
        votersList.appendChild(chip);
      });

      totalNote.textContent = total === 0
        ? 'Ainda ninguém votou. Sê o primeiro!'
        : `${total} ${total === 1 ? 'voto' : 'votos'} no total.`;

    } catch (e) {
      totalNote.textContent = 'Não foi possível carregar os resultados agora.';
    }
  }

  submitBtn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    if (!name || !selectedChoice) return;

    submitBtn.disabled = true;
    statusMsg.textContent = 'A guardar o teu voto...';
    statusMsg.className = 'status';

    try {
      const key = 'votes:' + slug(name);
      await window.storage.set(key, JSON.stringify({
        name: name,
        choice: selectedChoice,
        timestamp: Date.now()
      }), true);

      statusMsg.textContent = `Voto registado: ${name} → ${selectedChoice === 'menino' ? 'Menino 💙' : 'Menina 🩷'}`;
      statusMsg.className = 'status ok';

      await loadResults();
    } catch (e) {
      statusMsg.textContent = 'Ocorreu um erro ao guardar o voto. Tenta novamente.';
      submitBtn.disabled = false;
    }
  });

  loadResults();
  setInterval(loadResults, 4000);
</script>
</body>
</html>
